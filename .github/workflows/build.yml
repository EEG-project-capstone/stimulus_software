name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: stimulus_software_macos.zip
          - os: ubuntu-latest
            artifact_name: stimulus_software_linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install portaudio ffmpeg

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev ffmpeg python3-tk

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install pandas pydub sounddevice numpy mne scipy

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller stimulus_software.spec
          cd dist && zip -r ../stimulus_software_macos.zip "Stimulus Software.app"

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller stimulus_software.spec
          cp dist/stimulus_software ./stimulus_software_linux
          chmod +x stimulus_software_linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/stimulus_software_macos.zip
            artifacts/stimulus_software_linux
